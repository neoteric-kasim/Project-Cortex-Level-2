name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          az acr login --name neotericregistry

      - name: Build and push Docker image
        run: |
          docker build -t neotericregistry.azurecr.io/cortex-fullstack:${{ github.sha }} .
          docker push neotericregistry.azurecr.io/cortex-fullstack:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name cortex-api \
            --resource-group neoteric-01 \
            --image neotericregistry.azurecr.io/cortex-fullstack:${{ github.sha }} \
            --revision-suffix deploy-${{ github.run_number }}